plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}


def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'


android {
    namespace "io.codemagic.flutter"
    compileSdkVersion flutter.compileSdkVersion
    buildToolsVersion "35.0.1" 
    ndkVersion "27.3.13750724"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    def latestGooglePlayBuildNumber = Integer.valueOf(System.env.LATEST_BUILD_NUMBER ?: System.env.BUILD_NUMBER ?: 0)

    defaultConfig {
        applicationId "io.codemagic.flutter"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode latestGooglePlayBuildNumber + 1
        versionName "1.0." + String.valueOf(latestGooglePlayBuildNumber + 1)
        //setProperty("archivesBaseName", "app-release-renamed")
    }
    signingConfigs {
          release {
              if (System.getenv()["CI"]) { // CI=true is exported by Codemagic2
                  storeFile file(System.getenv()["CM_KEYSTORE_PATH"])
                  storePassword System.getenv()["CM_KEYSTORE_PASSWORD"]
                  keyAlias System.getenv()["CM_KEY_ALIAS"]
                  keyPassword System.getenv()["CM_KEY_PASSWORD"]
            } else {
                def storePath = keystoreProperties['storeFile']
                if (storePath) {
                    storeFile file(storePath)
                    storePassword keystoreProperties['storePassword']
                    keyAlias keystoreProperties['keyAlias']
                    keyPassword keystoreProperties['keyPassword']
                }
          }

      }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
        }
         debug {
            signingConfig signingConfigs.debug
            minifyEnabled true
        }
    }
            
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
    
}
