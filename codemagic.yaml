  flutter-integration-tests-demo-android-workflow:
    name: Flutter Integration Tests Demo Android Workflow
    instance_type: mac_mini_m2
    working_directory: flutter/flutter-integration-tests-demo-project
    max_build_duration: 120
    environment:
      groups:
        - flutter_integration_test_credentials # <-- (Includes GCLOUD_KEY_FILE, GOOGLE_CREDENTIALS)
      vars:
        FIREBASE_PROJECT: "flutter-integration-test-dd885" # <-- Put your Firebase Project ID here
      flutter: stable
      xcode: latest # <-- set to specific version e.g. 14.3, 15.0 to avoid unexpected updates.
      cocoapods: default
    scripts:
      - name: Set up debug.keystore
        script: |
          rm -f ~/.android/debug.keystore
          keytool -genkeypair -alias androiddebugkey -keypass android -keystore ~/.android/debug.keystore -storepass android -dname 'CN=Android Debug,O=Android,C=US' -keyalg 'RSA' -keysize 2048 -validity 10000
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build APK with Flutter
        script: |
          flutter build apk --debug
      - name: Create debug and test APK
        script: |
          set -ex
          cd android
          ./gradlew app:assembleAndroidTest
          ./gradlew app:assembleDebug -Ptarget="$CM_BUILD_DIR/flutter/flutter-integration-tests-demo-project/integration_test/app_test.dart"
      - name: Run Firebase Test Lab tests
        script: |
          set -ex

          echo $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS > ./gcloud_key_file.json

          gcloud auth activate-service-account --key-file=gcloud_key_file.json

          gcloud --quiet config set project $FIREBASE_PROJECT

          gcloud firebase test android run \
            --type instrumentation \
            --app build/app/outputs/apk/debug/app-debug.apk \
            --test build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --timeout 3m
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log
    publishing:
      # See the following link for details about email publishing - https://docs.codemagic.io/publishing-yaml/distribution/#email
      email:
        recipients:
          - user_1@example.com
          - user_2@example.com
        notify:
          success: true # To not receive a notification when a build succeeds
          failure: false # To not receive a notification when a build fails
      slack:
        # See the following link about how to connect your Slack account - https://docs.codemagic.io/publishing-yaml/distribution/#slack
        channel: "#channel-name"
        notify_on_build_start: true # To receive a notification when a build starts
        notify:
          success: true # To not receive a notification when a build succeeds
          failure: false # To not receive a notification when a build fails
  flutter-integration-tests-demo-ios-workflow:
      name: Flutter Integration Tests Demo iOS Workflow
      working_directory: flutter/flutter-integration-tests-demo-project
      instance_type: mac_mini_m2
      integrations:
        app_store_connect: codemagic_samples2
      environment:
        ios_signing:
          distribution_type: app_store
          bundle_identifier: io.codemagic.cmflutteryaml
        flutter: stable
        xcode: latest # <-- set to specific version e.g. 14.3, 15.0 to avoid unexpected updates.
        cocoapods: default
        groups:
          - flutter_integration_test_credentials
        vars:
          FIREBASE_PROJECT: "flutter-integration-test-dd885" # <-- Put your Firebase Project ID here
          BUNDLE_ID: "io.codemagic.cmflutteryaml"
          TEST_BUNDLE_ID: "io.codemagic.cmflutteryaml.uitests.xctrunner"
      scripts:
        - name: Configure Firebase access
          script: |
            set -e
            echo $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS > ./gcloud_key_file.json          
            gcloud auth activate-service-account --key-file=gcloud_key_file.json
            gcloud --quiet config set project $FIREBASE_PROJECT

        # - keychain initialize
        # - app-store-connect fetch-signing-files ${BUNDLE_ID} --create
        # - app-store-connect fetch-signing-files ${TEST_BUNDLE_ID} --create
        # - keychain add-certificates
        - xcode-project use-profiles --code-signing-setup-verbose-logging

        - name: Build app for testing
          script: |
            set -ex

            flutter build ios integration_test/app_test.dart --release

            cd ios
            xcodebuild \
              -workspace Runner.xcworkspace \
              -scheme Runner \
              -config Flutter/Release.xcconfig \
              -derivedDataPath "../build/ios_integ" \
              -sdk iphoneos \
              build-for-testing
        - name: Package tests bundle
          script: |
            set -ex
            cd ./build/ios_integ/Build/Products
            zip -r "ios_tests.zip" *-iphoneos *.xctestrun
        - name: Run tests in Firebase Test Lab
          script: |
            gcloud firebase test ios models list
            gcloud firebase test ios run \
              --test "build/ios_integ/Build/Products/ios_tests.zip" \
              --device "model=iphone16pro,version=18.3,locale=en_US,orientation=portrait" \
              --timeout 3m  
      artifacts:
        - "**/ios_tests.zip"
      publishing:
        email:
          recipients:
            - user_1@example.com
            - user_2@example.com
          notify:
            success: true
            failure: false
        google_play:
          credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
          track: internal
          submit_as_draft: true

  ionic-capacitor-ios-workflow:
    name: Ionic Capacitor iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: ionic/ionic-capacitor-demo-project
    integrations:
      app_store_connect: codemagic_samples2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.codemagic.ioniccapacitor
      vars:
        # Ionic Xcode worskspace and scheme
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest # <-- set to specific version e.g. 14.3, 15.0 to avoid unexpected updates.
      cocoapods: default

    scripts:
      - name: Install npm dependencies for Ionic project
        script: |
          npm install
      - name: Cocoapods installation
        script: |
          cd ios/App && pod install
      - name: Compile web code to dist folder
        script: npm run build
      - name: Update dependencies and copy web assets to native project
        script: |
          # npx cap copy # <- use this is you don't need to update native dependencies
          npx cap sync # <- update native dependencies and copy web assets to native project
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ionic/ionic-capacitor-demo-project/ios/App
          agvtool new-version -all $(($BUILD_NUMBER))
          agvtool new-marketing-version 1.0.$(($BUILD_NUMBER))
      - name: Build ipa for distribution
        script: |
          cd $CM_BUILD_DIR/ionic/ionic-capacitor-demo-project/ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/App.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration

  ionic-capacitor-android-workflow:
    name: Ionic Capacitor Android Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: ionic/ionic-capacitor-demo-project
    environment:
      android_signing:
        - codemagic_keystore
